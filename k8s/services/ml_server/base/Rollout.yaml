apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ml-server
  labels:
    app: ml-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-server
  template:
    metadata:
      labels:
        app: ml-server
    spec:
      containers:
        - name: mlops-container
          image: igorsantarek/ml_server
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
          - name: HF_HOME
            value: /tmp/.cache
          - name: DB_URI
            valueFrom:
              secretKeyRef:
                name: cnpg-cluster-app
                key: uri
          - name: LOAD_MODEL
            value: "true"
          readinessProbe:
            httpGet:
              path: /api/ping
              port: 8000
          startupProbe:
            httpGet:
              path: /api/ping
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2048Mi"
              cpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
      volumes:
        - name: tmp
          emptyDir: {}
  strategy:
    canary: #Indicates that the rollout should use the Canary strategy
      maxSurge: '25%'
      maxUnavailable: 0
      steps:
        - setWeight: 33
        - pause: {} # pause indefinitely
        - setWeight: 66
        - pause: { duration: 10s }
