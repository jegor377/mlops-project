apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ml-server-route
spec:
  parentRefs:
  - name: ml-server-gw
  hostnames:
  - ml-server-production
  rules:
  - matches:
      - path:
          type: PathPrefix
          value: /api/
    backendRefs:
    - name: ml-server-svc
      port: 8000
