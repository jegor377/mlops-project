apiVersion: batch/v1
kind: Job
metadata:
  name: ml-server-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: igorsantarek/ml_server
          command: ["/app/.venv/bin/alembic", "upgrade", "head"]
          env:
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: cnpg-cluster-app
                  key: uri
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
      volumes:
        - name: tmp
          emptyDir: {}