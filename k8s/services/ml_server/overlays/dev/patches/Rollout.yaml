- op: replace
  path: /apiVersion
  value: apps/v1
- op: replace
  path: /kind
  value: Deployment
- op: remove
  path: /spec/strategy
- op: add
  path: /spec/selector
  value:
    matchLabels:
      app: ml-server
- op: replace
  path: /spec/replicas
  value: 1
- op: replace
  path: /spec/template/spec/containers/0/securityContext/readOnlyRootFilesystem
  value: false
- op: add
  path: /spec/template/spec/initContainers
  value:
    - name: migrate
      image: igorsantarek/ml_server:latest
      command: ["/app/.venv/bin/alembic", "upgrade", "head"]
      env:
        - name: DB_URI
          valueFrom:
            secretKeyRef:
              name: cnpg-cluster-app
              key: uri
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: tmp
          mountPath: /tmp
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: HOSTNAME
    value: http://ml-server-dev.com
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: FRONTEND_HOSTNAME
    value: http://ml-server-dev.com
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: SMTP__HOST
    value: mailpit
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: SMTP__FROM_EMAIL_ADDRESS
    value: no-reply@example.com
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: GOOGLE_OAUTH2_CREDS__CLIENT_ID
    value: 103419354438-hgqip1ac5oibmo0vtq68d53japlj409g.apps.googleusercontent.com
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: GITHUB_OAUTH2_CREDS__CLIENT_ID
    value: Ov23liN9y4yqkCuQWfkK