- op: replace
  path: /spec/template/spec/containers/0/image
  value: igorsantarek/ml_server:latest
- op: replace
  path: /apiVersion
  value: apps/v1
- op: replace
  path: /kind
  value: Deployment
- op: remove
  path: /spec/strategy
- op: add
  path: /spec/selector
  value:
    matchLabels:
      app: ml-server
- op: replace
  path: /spec/replicas
  value: 1
- op: replace
  path: /spec/template/spec/containers/0/securityContext/readOnlyRootFilesystem
  value: false