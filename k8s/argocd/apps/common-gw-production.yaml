apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: common-gw-production
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/jegor377/mlops-project.git
    path: k8s/services/common-gw/overlays/production
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: common-gw-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true