apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-server-staging
  namespace: argocd
spec:
  project: ml-server
  source:
    repoURL: https://github.com/jegor377/mlops-project.git
    path: k8s/services/server/overlays/staging
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-project-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true