apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: platform
  source:
    chart: traefik
    repoURL: https://traefik.github.io/charts
    targetRevision: 38.0.2
    helm:
      releaseName: traefik
      values:
        logs:
          access:
            enabled: true
        # we enable gateway-api features
        providers:
          kubernetesGateway:
            enabled: true
            experimentalChannel: false
        # we disable gateway-api defaults because we want to provide our own
        gatewayClass:
          enabled: false
        # we disable gateway-api defaults because we want to provide our own
        gateway:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: traefik-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true