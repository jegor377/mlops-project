version: '3'

tasks:
  port-forward:
    desc: "Port forward the Traefik gateway to localhost"
    cmds:
      - kubectl -n traefik-system port-forward svc/traefik 80
  apply-dev-resources:
    desc: "Apply development resources to the cluster"
    cmds:
      - kubectl apply -k services/ml_server/overlays/dev
      - kubectl apply -k services/frontend/overlays/dev
  install-argo-rollouts-plugin:
    desc: "Install the Argo Rollouts plugin for Argo CD"
    cmds:
      - curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
      - chmod +x ./kubectl-argo-rollouts-linux-amd64
      - sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts
      - kubectl argo rollouts version
  apply-root-app:
    desc: "Apply the root Argo CD application"
    cmds:
      - kubectl apply -f argocd/app-project-ml-server.yaml
      - kubectl apply -f argocd/app-project-frontend.yaml
      - kubectl apply -f argocd/root-app.yaml
  get-argocd-pw:
    desc: "Get the initial admin password for Argo CD"
    cmds:
      - argocd admin initial-password -n argocd
  open-argocd-ui:
    desc: "Open the Argo CD UI in the browser"
    cmds:
      - kubectl port-forward svc/argocd-server -n argocd 8080:443
  open-argo-rollouts-ui:
    desc: "Open the Argo Rollouts UI in the browser"
    cmds:
      - kubectl argo rollouts dashboard
  run-lb-gw:
    desc: "Run the Cloud Provider Kind load balancer for Gateway API"
    cmds:
      - cloud-provider-kind --gateway-channel standard
  test-dev-env-ping:
    vars:
      IP: "172.18.0.5"
    desc: "Test the ping endpoint of the ML server"
    cmds:
      - |
        curl -H "Host: ml-server-dev" http://{{.IP}}/ping
        printf "\n"
  add-gcloud-kubectx:
    desc: "Add gcloud context to kubectl"
    cmds:
      - gcloud container clusters get-credentials ml-server-cluster --zone us-central1-a