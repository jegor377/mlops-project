apiVersion: gitops.kluctl.io/v1beta1
kind: KluctlDeployment
metadata:
  name: ml-server-delpoyment
  namespace: kluctl-gitops
spec:
  interval: 5m
  source:
    git:
      url: https://github.com/jegor377/mlops-project.git
      path: k8s/kluctl
  credentials:
    git:
      - host: github.com
        secretRef:
          name: github-auth
  target: staging
  context: default
  prune: true
  delete: true
