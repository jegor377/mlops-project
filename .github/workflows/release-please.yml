name: Release Please

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    steps:
    - name: Check GitHub token permissions
      run: |
        echo "Checking token scopes..."
        curl -s -D - \
        -H "Authorization: token ${{ secrets.RELEASE_PLEASE_TOKEN }}" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/
  release-please:
    runs-on: ubuntu-latest
    steps:
    - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
      with:
        token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        config-file: .github/workflows/release-please/release-please-config.json
        manifest-file: .github/workflows/release-please/.release-please-manifest.json
        target-branch: main
