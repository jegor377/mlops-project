name: Release Please

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    steps:
    - name: "Test issues: write"
      run: |
        code=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Authorization: token ${{ github.token }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/issues \
          -d '{"title":"Permission test"}')
        echo "Issues API response: $code"

    - name: "Test contents: write"
      run: |
        code=$(curl -s -o /dev/null -w "%{http_code}" \
          -X PUT \
          -H "Authorization: token ${{ github.token }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/contents/test.txt \
          -d '{"message":"test commit","content":"dGVzdA=="}')
        echo "Contents API response: $code"

    - name: "Test pull-requests: write"
      run: |
        code=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Authorization: token ${{ github.token }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/pulls \
          -d '{"title":"PR test","head":"main","base":"main"}')
        echo "PR API response: $code"

  release-please:
    runs-on: ubuntu-latest
    steps:
    - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
      with:
        token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        config-file: .github/workflows/release-please/release-please-config.json
        manifest-file: .github/workflows/release-please/.release-please-manifest.json
        target-branch: main
