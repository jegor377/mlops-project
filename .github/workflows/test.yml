name: Test

on:
  push:
    branches: [ "main" ]
    paths:
      - "server/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "server/**"

permissions:
  contents: read

jobs:
  build:

    # don't test on release-please uv lock update commits
    if: >-
      (github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore: release main')) ||
      (github.event_name == 'pull_request' && !contains(github.event.pull_request.title, 'chore: release main'))

    runs-on: ubuntu-latest

    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
    - name: Debug info
      run: |
        echo "Event name: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo "SHA: ${{ github.sha }}"
        echo "Actor: ${{ github.actor }}"
        echo "Workflow: ${{ github.workflow }}"
        echo "Commit message: ${{ github.event.head_commit.message }}"
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
      with:
        path: |
          /tmp/.uv-cache
          ~/.cache/uv
          ~/.cache/pip
          ~/.cache/flake8
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          uv-${{ runner.os }}
    - name: Set up Python 3.12.3
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
      with:
        python-version: "3.12.3"
    - name: Install Task
      uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      with:
        version: 3.x
    - name: Install uv
      uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
    - name: Install dependencies
      run: task sync-deps
    - name: Lint with flake8
      run: task lint
    - name: Test with pytest (fail fast)
      run: task server:test-not-slow
    - name: Test with pytest (slow tests)
      run: task server:test-slow
    - name: Minimize uv cache
      run: uv cache prune --ci
