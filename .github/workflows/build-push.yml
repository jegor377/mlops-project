name: Build & Push Docker image

on:
  push:
    branches: [ "main" ]
    paths:
      - "server/**"
    tags:
      - "**@[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0
    - name: Install Task
      uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      with:
        version: 3.x
    - name: Log in to Docker Hub
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        username: ${{ vars.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Compute image tag
      id: image-tag
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          IMAGE_TAG=$(task -s utils:generate-version-tag -- server)
          VERSION=$(task -s utils:generate-version -- server)
          echo "environment=production" >> $GITHUB_OUTPUT
        else # if on push to main branch
          IMAGE_TAG=$(task -s utils:generate-extended-version-tag -- server)
          VERSION=$(task -s utils:generate-extended-version -- server)
          echo "environment=staging" >> $GITHUB_OUTPUT
        fi
        echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      with:
        driver: docker-container
    - name: Build and push Docker image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./server
        push: ${{ !env.ACT }}
        tags: ${{ steps.image-tag.outputs.image_tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Update Kubernetes manifests with new image tag
      if: ${{ !env.ACT }}
      run: |
        task utils:update-image-tags NEW_TAG=${{ steps.image-tag.outputs.version }} ENVIRONMENT=${{ steps.image-tag.outputs.environment }}
    - uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "chore: Update image version to ${{ steps.image-tag.outputs.version }} on ${{ steps.image-tag.outputs.environment }} environment"
        branch: main
        file_pattern: "k8s/services/server/overlays/*/patches/Deployment.yaml"
