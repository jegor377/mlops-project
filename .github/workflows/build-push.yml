name: Build & Push Docker image

on:
  push:
    branches: [ "main" ]
    paths:
      - "server/**"
    tags:
      - "**@[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0
    - name: Install Task
      uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      with:
        version: 3.x
    - name: Log in to Docker Hub
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        username: ${{ vars.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Compute image tag
      id: image-tag
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          IMAGE_TAG=$(task -s build-push-wf:utils:generate-version-tag -- server)
          VERSION=$(task -s build-push-wf:utils:generate-version -- server)
          echo "environment=production" >> $GITHUB_OUTPUT
        else # if on push to main branch
          IMAGE_TAG=$(task -s build-push-wf:utils:generate-extended-version-tag -- server)
          VERSION=$(task -s build-push-wf:utils:generate-extended-version -- server)
          echo "environment=staging" >> $GITHUB_OUTPUT
        fi
        echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      with:
        driver: docker-container
    - name: Build and push Docker image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./server
        push: ${{ !env.ACT }}
        tags: ${{ steps.image-tag.outputs.image_tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Figure out environment file
      id: env-file
      run: |
        if [[ "${{ steps.image-tag.outputs.environment }}" == "production" ]]; then
          echo "env_file=k8s/kluctl/services/server/config/production.yaml" >> $GITHUB_OUTPUT
        else
          echo "env_file=k8s/kluctl/services/server/config/staging.yaml" >> $GITHUB_OUTPUT
        fi
    - name: YAML Update Action
      if: ${{ !env.ACT }}
      uses: fjogeleit/yaml-update-action@04ff6ec06568fd21197db746472e36cc425de850 #v0.16.1
      with:
        valueFile: ${{ steps.env-file.outputs.env_file }}
        propertyPath: 'apiServer.version'
        value: ${{ steps.image-tag.outputs.version }}
        message: "chore: Update apiServer version to ${{ steps.image-tag.outputs.version }} on ${{ steps.image-tag.outputs.environment }} environment"
