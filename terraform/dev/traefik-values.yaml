logs:
  access:
    enabled: true
# we enable gateway-api features
providers:
  kubernetesGateway:
    enabled: true
    experimentalChannel: false
# we disable gateway-api defaults because we want to provide our own
gatewayClass:
  enabled: false
# we disable gateway-api defaults because we want to provide our own
gateway:
  enabled: false
ports:
  web:
    port: 80
    exposedPort: 80
  websecure:
    port: 443
    exposedPort: 443

additionalArguments: []  # remove the entrypoint args here